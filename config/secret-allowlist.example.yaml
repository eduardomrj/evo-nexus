# Example allowlist for scripts/evonexus-secret.
# Copy to /home/evonexus/.config/evonexus/secret-allowlist.yaml and keep mode 600.

secrets:
  discord-plus-bot-token:
    vault:
      server: https://keys.myworkhome.com.br
      item_name: bot-openclaude-nexus
      field: password
    install:
      destination: /home/evonexus/.claude/channels/discord-plus/.env
      env_key: DISCORD_BOT_TOKEN
      file_mode: "0600"
      owner: evonexus
      create_parent: true
      preserve_existing_keys: true
    assertions:
      expected_bot_id: "1502373220886646964"
      expected_bot_label: "OpenClaude Nexus#4241"
    forbidden_paths: [/home/evonexus/.claude/channels/discord/.env, /home/evonexus/.claude/channels/discord]
